<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Barber Shop</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="logo">💈</div>
        <h2>Bem-vindo de volta</h2>

        {% if erro %}
        <div class="alerta-erro">⚠️ {{ erro }}</div>
        {% endif %}

        <form method="POST">
            <div class="campo">
                <label>Usuário</label>
                <input type="text" name="username" placeholder="Digite seu usuário" required>
            </div>
            <div class="campo">
                <label>Senha</label>
                <input type="password" name="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn">Entrar</button>
        </form>

        <p class="link-bloco">Não tem conta? <a href="/register"><span>Criar conta</span></a></p>
        <p class="link-bloco" style="margin-top:8px;"><a href="/">← Voltar</a></p>
    </div>
</body>
</html>
